version: '3.8'

services:
  # Aplikasi Utama Next.js
  app:
    build: .
    container_name: it-hospital-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://itadmin:${DB_PASSWORD}@db:5432/it_hospital
    depends_on:
      - db
    volumes:
      - .:/app
      - /app/node_modules
      - ./public/uploads:/app/public/uploads
    networks:
      - it-network

  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: it-hospital-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: itadmin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-itadmin123}
      POSTGRES_DB: it_hospital
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - it-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itadmin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (untuk production)
  nginx:
    image: nginx:alpine
    container_name: it-hospital-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    networks:
      - it-network
    depends_on:
      - app

  # RustDesk Server (Remote Access)
  rustdesk-hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    restart: unless-stopped
    ports:
      - "21115:21115"
      - "21116:21116"
      - "21116:21116/udp"
    volumes:
      - rustdesk_data:/root
    command: hbbs
    networks:
      - it-network

  rustdesk-hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    restart: unless-stopped
    ports:
      - "21117:21117"
    volumes:
      - rustdesk_data:/root
    command: hbbr
    networks:
      - it-network

  # Apache Guacamole
  guacd:
    image: guacamole/guacd:latest
    container_name: guacd
    restart: unless-stopped
    networks:
      - it-network

  guacamole-db:
    image: postgres:16-alpine
    container_name: guacamole-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${GUAC_DB_PASSWORD:-guacamole123}
      POSTGRES_DB: guacamole_db
    volumes:
      - guacamole_data:/var/lib/postgresql/data
    networks:
      - it-network

  guacamole:
    image: guacamole/guacamole:latest
    container_name: guacamole
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      GUACD_HOSTNAME: guacd
      POSTGRESQL_HOSTNAME: guacamole-db
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole_user
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD:-guacamole123}
    depends_on:
      - guacd
      - guacamole-db
    networks:
      - it-network

volumes:
  postgres_data:
  rustdesk_data:
  guacamole_data:

networks:
  it-network:
    driver: bridge